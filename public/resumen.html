<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventPlanner — Reportes</title>
  <link rel="stylesheet" href="css/events.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="app-body">

<nav class="navbar">
  <div class="nav-brand"><span class="brand-icon-sm">✦</span><span class="brand-name">EventPlanner</span></div>
  <div class="nav-links" id="navLinks">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="eventos.html" class="nav-link">Eventos</a>
    <a href="invitados.html" class="nav-link">Invitados</a>
    <a href="presupuestos.html" class="nav-link">Presupuestos</a>
    <a href="resumen.html" class="nav-link active">Reportes</a>
  </div>
  <div class="nav-user">
    <div class="user-avatar" id="userAvatar">M</div>
    <span id="userName">Mari</span>
    <button class="btn-ghost" onclick="doLogout()">Logout</button>
  </div>
  <button class="hamburger" onclick="toggleMenu()">☰</button>
</nav>

<main class="main-content">
  <div class="page-header">
    <h2>Reportes</h2>
    <button class="btn-primary" onclick="generarPDF()">⬇ Descargar PDF</button>
  </div>
  <div class="reportes-grid">
    <div class="card">
      <div class="card-header"><h3>Eventos Concluidos</h3></div>
      <div class="big-number" id="repConcluidos">$0</div>
      <p class="sub-label">Valor total gestionado</p>
    </div>
    <div class="card">
      <div class="card-header"><h3>Eventos Próximos</h3></div>
      <div class="big-number" id="repProximos">0</div>
      <p class="sub-label">Eventos en agenda</p>
    </div>
    <div class="card">
      <div class="card-header"><h3>Presupuesto Total</h3></div>
      <div class="big-number" id="repPresupuesto">$0</div>
      <p class="sub-label">Suma de presupuestos</p>
    </div>
    <div class="card full-width">
      <div class="card-header"><h3>Asistencia por Evento</h3></div>
      <canvas id="asistenciaChart" height="120"></canvas>
    </div>
    <div class="card full-width">
      <div class="card-header"><h3>Presupuesto vs Real</h3></div>
      <canvas id="presupVsRealChart" height="120"></canvas>
    </div>
  </div>
</main>

<div id="toast" class="toast"></div>
<script src="js/db.js"></script>
<script src="js/planner.js"></script>
<script src="js/reportes.js"></script>
</body>
</html>
