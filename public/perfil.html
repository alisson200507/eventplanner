<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventPlanner — Mi Perfil</title>
  <link rel="stylesheet" href="css/events.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="app-body">

<nav class="navbar">
  <div class="nav-brand"><span class="brand-icon-sm">✦</span><span class="brand-name">EventPlanner</span></div>
  <div class="nav-links" id="navLinks">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="eventos.html" class="nav-link">Eventos</a>
    <a href="invitados.html" class="nav-link">Invitados</a>
    <a href="presupuestos.html" class="nav-link">Presupuestos</a>
    <a href="resumen.html" class="nav-link">Reportes</a>
    <a href="perfil.html" class="nav-link active">Mi Perfil</a>
  </div>
  <div class="nav-user">
    <div class="user-avatar" id="userAvatar">M</div>
    <span id="userName">Mari</span>
    <button class="btn-ghost" onclick="doLogout()">Logout</button>
  </div>
  <button class="hamburger" onclick="toggleMenu()">☰</button>
</nav>

<main class="main-content">
  <div class="page-header">
    <h2>Mi Perfil</h2>
  </div>

  <div class="perfil-grid">
    <div class="card">
      <div class="card-header"><h3>Información Personal</h3></div>
      <div class="perfil-avatar-wrap">
        <div class="perfil-avatar" id="perfilAvatar">M</div>
        <div>
          <div class="perfil-nombre" id="perfilNombre">Mari</div>
          <div class="perfil-rol" id="perfilRol">Organizador General</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h3>Cambiar Correo y Contraseña</h3></div>
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" id="perfilEmail" placeholder="tucorreo@gmail.com">
      </div>
      <div class="form-group">
        <label>Contraseña Actual</label>
        <input type="password" id="perfilPassActual" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Nueva Contraseña</label>
        <input type="password" id="perfilPassNueva" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label>Confirmar Nueva Contraseña</label>
        <input type="password" id="perfilPassConfirm" placeholder="••••••••">
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:1rem">
        <button class="btn-primary" onclick="guardarPerfil()">Guardar Cambios</button>
      </div>
    </div>
  </div>
</main>

<div id="toast" class="toast"></div>
<script src="js/db.js"></script>
<script src="js/planner.js"></script>
<script src="js/perfil.js"></script>
</body>
</html>
